name: Core CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  api-build-and-docs:
    name: API build + docs domain check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build API
        run: bun run --cwd apps/api build

      - name: Check generated domain docs
        run: bun run docs:check:domains

  saga-smoke:
    name: Strict saga smoke
    runs-on: ubuntu-latest
    needs:
      - api-build-and-docs
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bizing
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bizing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bizing
      PORT: 6130
      BIZING_RUNTIME_ASSURANCE_MODE: staging_strict
      BETTER_AUTH_SECRET: ci-better-auth-secret-please-change
      BETTER_AUTH_URL: http://localhost:6130
      BETTER_AUTH_BASE_URL: http://localhost:6130
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:6130
      API_BASE_URL: http://localhost:6130
      ADMIN_APP_ORIGIN: http://localhost:9000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5432 -U postgres -d bizing; then
              exit 0
            fi
            sleep 1
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Push DB schema
        run: bun run --cwd packages/db db:push

      - name: Start API server
        run: |
          bunx --cwd apps/api tsx src/server.ts > /tmp/bizing-api.log 2>&1 &
          echo $! > /tmp/bizing-api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 90); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6130/api/v1/health || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become healthy."
          cat /tmp/bizing-api.log || true
          exit 1

      - name: Generate and sync one saga spec
        run: bun run --cwd apps/api sagas:generate -- --sync=true --limitUseCases=1 --maxPersonasPerUseCase=1

      - name: Run strict saga smoke
        run: SAGA_FAST_MODE=1 SAGA_LIMIT=1 bun run --cwd apps/api sagas:rerun

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/bizing-api.pid ]; then
            kill "$(cat /tmp/bizing-api.pid)" || true
          fi

      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bizing-api-log
          path: /tmp/bizing-api.log
